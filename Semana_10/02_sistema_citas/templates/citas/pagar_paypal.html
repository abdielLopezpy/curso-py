{% extends "base.html" %}
{% block title %}Pagar con PayPal{% endblock %}

{% block content %}
<div class="page-header">
    <h1>&#127760; Pagar con PayPal</h1>
</div>

<div class="card" style="max-width: 500px;">
    <div class="card-header">Resumen de la Cita</div>
    <div class="card-body">
        <p><strong>Servicio:</strong> {{ servicio.nombre }}</p>
        <p><strong>Fecha:</strong> {{ datos_cita.fecha }}</p>
        <p><strong>Hora:</strong> {{ datos_cita.hora }}</p>
        <p style="font-size: 1.3rem; font-weight: 700; margin-top: 1rem;">
            Total: ${{ "%.2f"|format(servicio.precio) }}
        </p>

        <div id="paypal-button-container" style="margin-top: 1.5rem;"></div>

        <a href="{{ url_for('agendar_cita') }}" class="btn btn-secondary btn-block btn-sm mt-2">
            &#8592; Volver
        </a>
    </div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id={{ paypal_client_id }}&currency=USD"></script>
<script>
    paypal.Buttons({
        createOrder: function() {
            return fetch('/paypal/crear-orden-cita', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            }).then(function(res) { return res.json(); })
              .then(function(data) {
                  if (data.error) throw new Error(data.error);
                  return data.id;
              });
        },
        onApprove: function(data) {
            return fetch('/paypal/capturar-orden-cita', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({order_id: data.orderID})
            }).then(function(res) { return res.json(); })
              .then(function(result) {
                  if (result.error) {
                      alert('Error: ' + result.error);
                  } else {
                      window.location.href = result.redirect;
                  }
              });
        },
        onError: function(err) {
            alert('Error con PayPal: ' + err);
        }
    }).render('#paypal-button-container');
</script>
{% endblock %}
